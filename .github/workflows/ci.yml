name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      # No API key required — every LLM call in tests/unit/ is mocked.
      - name: Run unit tests
        run: poetry run pytest tests/unit/ -v

  integration-tests:
    name: Integration tests (real LLM calls)
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      # Skips gracefully (see _looks_like_real_key in src/config/settings.py)
      # if OPENAI_API_KEY isn't configured as a repo secret — e.g. on PRs
      # from forks, which never receive secrets from the base repo.
      - name: Run judge calibration tests
        run: poetry run pytest tests/integration/ -v

      # A single golden case end-to-end through the real pipeline — proves
      # the eval harness itself still runs, not a full 20-case cost outlay
      # on every push.
      - name: Run eval smoke case
        run: poetry run python scripts/run_eval.py --case D01
